<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A0E1A"/>
      <stop offset="100%" stop-color="#070B16"/>
    </linearGradient>
    <linearGradient id="shield" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4A7FFF"/>
      <stop offset="100%" stop-color="#00D4FF"/>
    </linearGradient>
    <linearGradient id="inner" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2E5FCC"/>
      <stop offset="100%" stop-color="#4A7FFF"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="0.8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <!-- Shield shape -->
  <path d="M16 3 L29 8.5 L29 19 Q29 27 16 31 Q3 27 3 19 L3 8.5 Z" fill="url(#shield)" filter="url(#glow)"/>
  <!-- Shield inner -->
  <path d="M16 5.5 L27 10.2 L27 19 Q27 25.5 16 29 Q5 25.5 5 19 L5 10.2 Z" fill="url(#inner)" opacity="0.55"/>
  <!-- Lock body -->
  <rect x="11.5" y="17.5" width="9" height="7" rx="1.8" fill="white" opacity="0.95"/>
  <!-- Lock shackle -->
  <path d="M13.2 17.5 L13.2 14.5 A2.8 2.8 0 0 1 18.8 14.5 L18.8 17.5" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.95"/>
  <!-- Keyhole -->
  <circle cx="16" cy="20.5" r="1.3" fill="#4A7FFF"/>
  <rect x="15.35" y="20.5" width="1.3" height="2.2" rx="0.65" fill="#4A7FFF"/>
</svg>
